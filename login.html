  <style>
    /* 1. Dashboard Variables & Base Styles */
    :root{
      --bg:#050506;                /* almost black */
      --panel:#0f1114;
      --muted:#9fb0c6;
      --accent1:#6ce7ff;           /* cyan */
      --accent2:#b86bff;           /* purple */
      --danger:#ff4d6d;
      --safe:#6bffb8;
      --font:'Outfit', 'Trebuchet MS', sans-serif;
      --large:18px;
      --focus: 3px solid rgba(108,231,255,0.18);
    }
    *{box-sizing:border-box;font-family:var(--font);}
    
    /* 2. Background and Centering (Matching Dashboard Theme) */
    body {
      margin: 0;
      padding: 0;
      font-family: var(--font);
      /* Use the dashboard's background */
      background: radial-gradient(circle at 10% 10%, rgba(184,107,255,0.02), transparent 14%),
                linear-gradient(180deg,#020203 0%,var(--bg) 100%);
      color: #eaf6ff; /* Light text color */
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing:antialiased;
    }
  
    #particleCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }



    /* 3. Container (The Login/Sign-up Box) */
    .container {
      width: 100%;
      max-width: 380px; /* Slightly wider for better look */
      /* Use panel color with soft border/shadow for depth */
      background: var(--panel); 
      border: 1px solid rgba(255,255,255,0.03); 
      border-radius: 12px; /* Smoother radius */
      box-shadow: 0 12px 40px rgba(0,0,0,0.6); /* Deeper shadow */
      padding: 30px; 
      position: relative;
    }
    
    /* 4. Back Arrow/Button */
    .back-arrow {
      position: absolute;
      top: 18px; 
      left: 18px; 
      font-size: 1.5rem;
      color: var(--muted); /* Muted color for the arrow */
      cursor: pointer;
      text-decoration: none;
      /* Added button style for consistency */
      background: transparent; 
      border:1px solid rgba(255,255,255,0.06); 
      padding:6px 10px; 
      border-radius:8px; 
    }
    
    /* 5. Heading Styles */
    h1 {
      margin: 2.5rem 0 1rem 0;
      font-size: 1.8rem; /* Slightly reduced font size */
      font-weight: 700; /* Bolder weight */
      text-align: left;
      color: #eaf6ff; /* Light color */
    }
    h1 span {
      color: var(--accent2); /* Use purple accent color */
    }
    
    /* 6. Form/Input Styles */
    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .input-group {
      position: relative;
    }
    .input-group input,
    .input-group select {
      width: 100%;
      max-width: 100%; /* Ensure full width of container */
      padding: 0.9rem 1rem 0.9rem 2.5rem;
      border-radius: 10px; /* Matched dashboard radius */
      border: 1px solid rgba(255,255,255,0.05); /* Subtle border */
      background: rgba(0,0,0,0.2); /* Darker, more transparent background */
      color: #eaf6ff;
      font-size: 0.9rem;
      outline: none;
      transition: border 0.2s;
      /* For select element specifically: */
      appearance: none;
      -webkit-appearance: none;
    }

    /* Match the select field color when open */
    .input-group select option {
        background-color: var(--panel);
        color: #eaf6ff;
    }
    
    /* Focus state matching dashboard focus */
    .input-group input:focus,
    .input-group select:focus {
        border-color: var(--accent1);
        box-shadow: 0 0 10px rgba(108, 231, 255, 0.2);
    }

    .input-group .icon {
      position: absolute;
      left: 0.8rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.1rem;
      color: var(--muted); /* Muted color for icons */
      pointer-events: none; /* Make icon unclickable */
      z-index: 10;
    }

    /* 7. Button Styles (Matching Dashboard Gradient Button) */
    .main-btn {
      width: 100%;
      padding: 0.8rem 0;
      /* Use the dashboard's primary gradient */
      background: linear-gradient(90deg,var(--accent1),var(--accent2));
      border: none;
      border-radius: 10px;
      color: #021018; /* Darker text for contrast on gradient */
      font-weight: 700;
      font-size: 1rem;
      margin: 0.5rem 0 0 0;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .main-btn:hover {
      background: linear-gradient(90deg,var(--accent1),var(--accent2)); /* Keep gradient */
      opacity: 0.85; /* Soft hover effect */
    }

    /* 8. Link Styles */
    .signup-link {
      margin-top: 2rem;
      font-size: 0.95rem;
      text-align: center;
      color: var(--muted); /* Muted color for link text */
    }
    .signup-link a {
      color: var(--accent1); /* Cyan accent for the link */
      text-decoration: none;
      font-weight: 700;
      margin-left: 0.3rem;
    }
    .signup-link a:hover {
      text-decoration: underline;
    }
    
    /* 9. Media Queries */
    @media (max-width: 500px) {
      .container {
        max-width: 95vw;
        padding: 1.5rem 1rem;
      }
      h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
  <canvas id="particleCanvas" aria-hidden="true"></canvas>
  <div class="container">
    <a href="index.html" class="back-arrow">&#8592;</a>
    <h1>Welcome <span>Back!</span></h1>
    <form id="loginForm">
      <div class="input-group">
        <span class="icon">&#128231;</span>
        <input type="email" id="email" placeholder="Email Address" required>
      </div>
      <div class="input-group">
        <span class="icon">&#128274;</span>
        <input type="password" id="password" placeholder="Password" required>
      </div>
      <div class="remember">
        <input type="checkbox" id="remember">
        <label for="remember">Remember me.</label>
      </div>
      <button class="main-btn" type="submit">LOG IN</button>
      <a href="#" class="forgot">Forgot Password?</a>
    </form>
    <div class="signup-link">
      Don't have an account? <a href="signup.html">Sign up</a>
    </div>
  </div>
  <script>
    (function(){const c=document.getElementById('particleCanvas'),x=c.getContext('2d');let W,H,p=[];const r=()=>{W=c.width=window.innerWidth;H=c.height=window.innerHeight;p=Array.from({length:40},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*2,s:Math.random()*0.5,o:Math.random()*0.5}))};const d=()=>{x.clearRect(0,0,W,H);p.forEach(e=>{x.globalAlpha=e.o;x.beginPath();x.arc(e.x,e.y,e.r,0,6.28);x.fillStyle='#bfefff';x.fill();e.y-=e.s;if(e.y<0)e.y=H});requestAnimationFrame(d)};window.addEventListener('resize',r);r();d();})();
  </script>

  <script type="module" src="firebase.js"></script>
  <script type="module" src="login.js"></script>
</body>
</html>
